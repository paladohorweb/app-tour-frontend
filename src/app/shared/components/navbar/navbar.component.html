<nav class="navbar navbar-expand-lg app-navbar">
  <div class="container-fluid px-3 px-lg-4">

    <a
      class="navbar-brand d-flex align-items-center gap-2 fw-bold"
      routerLink="/"
      (click)="closeAllMenus()">

      <span class="brand-logo">T</span>
      <span>TurismoApp</span>
    </a>

    <button
      class="navbar-toggler custom-toggler border-0 shadow-none"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Abrir navegación">

      <span class="toggler-line"></span>
      <span class="toggler-line"></span>
      <span class="toggler-line"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="menuOpen">

      <ul class="navbar-nav me-auto mb-3 mb-lg-0 gap-lg-1">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()">
            Inicio
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/tours"
            routerLinkActive="is-active"
            (click)="closeMenu()">
            Experiencias
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/mapa"
            routerLinkActive="is-active"
            (click)="closeMenu()">
            Mapa
          </a>
        </li>

        <li class="nav-item" *ngIf="auth.isAdmin()">
          <a
            class="nav-link"
            routerLink="/admin/dashboard"
            routerLinkActive="is-active"
            (click)="closeMenu()">
            Administración
          </a>
        </li>

        <li class="nav-item" *ngIf="auth.isGuia()">
          <a
            class="nav-link"
            routerLink="/guia/panel"
            routerLinkActive="is-active"
            (click)="closeMenu()">
            Panel guía
          </a>
        </li>
      </ul>

      <div
        *ngIf="!auth.isAuthenticated(); else loggedTemplate"
        class="guest-actions d-flex flex-column flex-lg-row gap-2">

        <a
          class="btn btn-outline-light btn-soft"
          routerLink="/login"
          (click)="closeMenu()">
          Iniciar sesión
        </a>

        <a
          class="btn btn-light btn-soft fw-semibold"
          routerLink="/register"
          (click)="closeMenu()">
          Crear cuenta
        </a>
      </div>

      <ng-template #loggedTemplate>
        <div class="user-dropdown ms-lg-3">

          <button
            type="button"
            class="user-toggle"
            (click)="toggleUserMenu()"
            [attr.aria-expanded]="userMenuOpen">

            <span class="user-avatar">
              {{ userInitial }}
            </span>

            <span class="user-meta d-none d-md-flex">
              <span class="user-name">{{ userDisplayName }}</span>
              <span class="user-role">{{ userRoleLabel }}</span>
            </span>

            <span class="dropdown-caret">▾</span>
          </button>

          <div class="user-menu" *ngIf="userMenuOpen">
            <div class="user-menu-header">
              <span class="user-avatar large">
                {{ userInitial }}
              </span>

              <div class="user-menu-info">
                <strong>{{ userDisplayName }}</strong>
                <span>{{ userEmail }}</span>
                <small>{{ userRoleLabel }}</small>
              </div>
            </div>

            <div class="menu-divider"></div>

            <a
              *ngIf="auth.getUserRole() === 'USER'"
              class="user-menu-item"
              routerLink="/mis-reservas">
              Mis reservas
            </a>

            <a
              *ngIf="auth.isAdmin()"
              class="user-menu-item"
              routerLink="/admin/dashboard">
              Panel administrativo
            </a>

            <a
              *ngIf="auth.isAdmin()"
              class="user-menu-item"
              routerLink="/admin/tours">
              Gestionar tours
            </a>

            <a
              *ngIf="auth.isAdmin()"
              class="user-menu-item"
              routerLink="/admin/reservas">
              Gestionar reservas
            </a>

            <a
              *ngIf="auth.isGuia()"
              class="user-menu-item"
              routerLink="/guia/panel">
              Mis experiencias asignadas
            </a>

            <div class="menu-divider"></div>

            <button
              type="button"
              class="user-menu-item danger"
              (click)="logout()">
              Cerrar sesión
            </button>
          </div>
        </div>
      </ng-template>

    </div>
  </div>
</nav>
