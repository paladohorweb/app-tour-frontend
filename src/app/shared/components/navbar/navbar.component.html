<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm sticky-top">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand fw-bold" routerLink="/tours" (click)="closeMenu()">
      TurismoApp
    </a>

    <button
      class="navbar-toggler border-0 shadow-none"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="menuOpen">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/tours" (click)="closeMenu()">Tours</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/mapa" (click)="closeMenu()">Mapa</a>
        </li>

        <li class="nav-item" *ngIf="auth.isAuthenticated()">
          <a class="nav-link" routerLink="/mis-reservas" (click)="closeMenu()">Mis reservas</a>
        </li>

        <li class="nav-item" *ngIf="auth.isAdmin()">
          <a class="nav-link" routerLink="/admin/tours" (click)="closeMenu()">Admin tours</a>
        </li>

        <li class="nav-item" *ngIf="auth.isAdmin()">
          <a class="nav-link" routerLink="/admin/reservas" (click)="closeMenu()">Admin reservas</a>
        </li>

        <li class="nav-item" *ngIf="auth.isGuia()">
          <a class="nav-link" routerLink="/guia/panel" (click)="closeMenu()">Panel guía</a>
        </li>
      </ul>

      <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2" *ngIf="!auth.isAuthenticated(); else loggedTpl">
        <a class="btn btn-outline-light btn-soft" routerLink="/login" (click)="closeMenu()">Login</a>
        <a class="btn btn-light btn-soft" routerLink="/register" (click)="closeMenu()">Registro</a>
      </div>

      <ng-template #loggedTpl>
        <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 user-box">
          <span class="badge rounded-pill text-bg-light px-3 py-2">
            {{ auth.getUserRole() }}
          </span>

          <span class="user-email text-truncate">
            {{ auth.currentUser?.email }}
          </span>

          <button class="btn btn-outline-light btn-soft" (click)="logout()">
            Salir
          </button>
        </div>
      </ng-template>
    </div>
  </div>
</nav>
