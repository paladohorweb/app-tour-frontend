<section class="page">

  <header class="header">
    <div>
      <h1>Mis Reservas</h1>
      <p class="muted">Gestiona tus reservas y pagos</p>
    </div>

    <button class="btn" (click)="cargar()">Actualizar</button>
  </header>

  <div class="card" *ngIf="loading">Cargando...</div>
  <div class="card error" *ngIf="error">{{ error }}</div>

  <div class="grid" *ngIf="!loading && reservas.length">

    <article class="item" *ngFor="let r of reservas">

      <div class="top">
        <h3>{{ r.tourNombre }}</h3>
        <span [class]="estadoClase(r.estado)">
          {{ r.estado }}
        </span>
      </div>

      <p><strong>Reserva:</strong> #{{ r.id }}</p>
      <p><strong>Monto:</strong> $ {{ r.monto | number }}</p>
      <p><strong>Método:</strong> {{ r.metodoPago || 'Sin definir' }}</p>

      <div class="row">

        <!-- PAGAR -->
        <a
          class="btn ghost"
          *ngIf="r.estado === 'PENDIENTE'"
          [routerLink]="['/pago', r.id]">
          Pagar
        </a>

        <!-- CANCELAR -->
        <button
          class="btn warning"
          *ngIf="puedeCancelar(r)"
          (click)="cancelar(r)">
          Cancelar
        </button>

        <!-- ELIMINAR -->
        <button
          class="btn danger"
          *ngIf="puedeEliminar(r)"
          (click)="eliminar(r)">
          Eliminar
        </button>

      </div>

    </article>

  </div>

</section>
