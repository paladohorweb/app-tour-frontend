<section class="wrap">
  <header class="header">
    <div>
      <h1>Pagar reserva</h1>
      <p class="muted" *ngIf="reserva">Reserva #{{ reserva.id }} · {{ reserva.tourNombre }}</p>
    </div>

    <a class="btn ghost" routerLink="/mis-reservas">Volver</a>
  </header>

  <div class="card" *ngIf="loading">Preparando pago...</div>
  <div class="card error" *ngIf="!loading && error">{{ error }}</div>

  <div class="card" *ngIf="!loading && !error && reserva">
    <div class="summary">
      <div>
        <span class="muted">Tour</span>
        <strong>{{ reserva.tourNombre }}</strong>
      </div>

      <div>
        <span class="muted">Monto</span>
        <strong>$ {{ reserva.monto | number }}</strong>
      </div>

      <div>
        <span class="muted">Estado</span>
        <strong>{{ reserva.estado }}</strong>
      </div>
    </div>

    <div class="field">
      <label>Método de pago</label>
      <select [(ngModel)]="metodoPago">
        <option *ngFor="let m of metodos" [ngValue]="m">{{ m }}</option>
      </select>
    </div>

    <div id="payment-element" *ngIf="metodoPago === 'TARJETA'"></div>

    <button type="button" class="btn" [disabled]="paying" (click)="pagar()">
      {{ paying ? 'Procesando...' : 'Pagar ahora' }}
    </button>
  </div>
</section>
