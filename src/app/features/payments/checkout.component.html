<section class="page">

  <h1>Checkout</h1>

  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && tour">

    <h2>{{ tour.nombre }}</h2>
    <p>{{ tour.ciudad }}, {{ tour.pais }}</p>
    <h3>$ {{ tour.precio }}</h3>

    <div class="field">
      <label>Método de pago</label>
      <select [(ngModel)]="metodoPago">
        <option *ngFor="let m of metodos" [value]="m">{{ m }}</option>
      </select>
    </div>

    <div id="payment-element" *ngIf="metodoPago === 'TARJETA'"></div>

    <button class="btn" (click)="pagar()" [disabled]="paying">
      {{ paying ? 'Procesando...' : 'Pagar' }}
    </button>

  </div>

</section>
