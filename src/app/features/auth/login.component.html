<div class="container py-5">
  <div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card card-soft">
        <div class="card-body p-4 p-lg-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold mb-2">Iniciar sesión</h2>
            <p class="text-muted mb-0">Accede a tu cuenta para continuar</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input
                type="email"
                class="form-control form-control-lg"
                formControlName="email"
                placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control form-control-lg"
                formControlName="password"
                placeholder="********">
            </div>

            <button class="btn btn-dark btn-lg w-100 btn-soft" [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Entrar' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <span class="text-muted">¿No tienes cuenta?</span>
            <a routerLink="/register" class="text-decoration-none ms-1 fw-semibold">Regístrate</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
