server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Health check para Docker.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # Archivos estáticos generados por Angular.
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rutas SPA de Angular.
    # Ejemplos:
    # /tours/1
    # /checkout/2
    # /admin/dashboard
    # /guia/panel
    # /demo/reset
    location / {
        try_files $uri $uri/ /index.html;
    }
}
